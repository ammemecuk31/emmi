<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Aslan Emmime Hediye</title>
<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg, #ff6a6a, #ffb347);
    font-family:Arial, sans-serif;
    text-align:center;
}
button {
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>Hediyen</h1>
<button onclick="sakaYap()">Hediyeyi almak için tıkla</button>

<p id="sonuc" style="margin-top:20px; font-size:20px;"></p>

<script>
function sakaYap() {
    const mesajlar = [
        "emmi yarrrramı yee"
    ];
    const secilen = mesajlar[Math.floor(Math.random()*mesajlar.length)];
    document.getElementById("sonuc").textContent = secilen;
}
</script>

</body>
</html>
